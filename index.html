<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificateur Entrainement VMA</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f6f2; --surface:#fff; --border:#e2dfd8; --border2:#ccc9c0;
  --text:#1a1916; --muted:#8a877e;
  --accent:#2563eb; --accent-light:#eff4ff;
  --red:#dc2626; --red-light:#fef2f2;
  --green:#16a34a; --green-light:#f0fdf4;
  --orange:#ea580c; --orange-light:#fff7ed;
  --purple:#7c3aed; --purple-light:#f5f3ff;
  --indigo:#4f46e5;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Geist',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.page{max-width:1140px;margin:0 auto;padding:40px 24px 80px}
.header{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.eyebrow{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.htitle{font-family:'Instrument Serif',serif;font-size:clamp(32px,5vw,52px);line-height:1.05;font-weight:400}
.htitle em{font-style:italic;color:var(--accent)}
.hsub{margin-top:8px;font-size:13px;color:var(--muted);max-width:520px;line-height:1.6}
.hbadge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);border:1px solid #bfdbfe;color:var(--accent);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.1em;padding:5px 12px;text-transform:uppercase;margin-top:12px;border-radius:4px}
.stitle{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;box-shadow:var(--shadow)}
.ctitle{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:5px}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'Geist Mono',monospace;font-size:15px;font-weight:500;padding:9px 12px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff}
.field input[readonly]{cursor:default}
.ro-blue{background:var(--accent-light)!important;border-color:#bfdbfe!important;color:var(--accent)!important}
.ro-red{background:var(--red-light)!important;border-color:#fecaca!important;color:var(--red)!important}
.ro-green{background:var(--green-light)!important;border-color:#bbf7d0!important;color:var(--green)!important}
.ro-orange{background:var(--orange-light)!important;border-color:#fed7aa!important;color:var(--orange)!important}
.ro-purple{background:var(--purple-light)!important;border-color:#ddd6fe!important;color:var(--purple)!important}
.hint{font-size:10px;color:var(--muted);margin-top:4px;font-family:'Geist Mono',monospace}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:680px){.g2,.g3{grid-template-columns:1fr}}
.mrow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
@media(max-width:680px){.mrow{grid-template-columns:1fr 1fr}}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:var(--shadow);text-align:center;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);border-radius:8px 8px 0 0}
.metric.r::before{background:var(--red)}.metric.g::before{background:var(--green)}.metric.o::before{background:var(--orange)}
.mval{font-family:'Instrument Serif',serif;font-size:30px;line-height:1.1;display:block;color:var(--accent)}
.metric.r .mval{color:var(--red)}.metric.g .mval{color:var(--green)}.metric.o .mval{color:var(--orange)}
.munit{font-family:'Geist Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;display:block;margin-top:2px}
.mname{font-size:10px;color:var(--muted);margin-top:8px;display:block;border-top:1px solid var(--border);padding-top:6px}
.tbar{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:16px;background:var(--bg)}
.tbar button{flex:1;padding:8px 12px;background:transparent;border:none;font-family:'Geist',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-right:1px solid var(--border)}
.tbar button:last-child{border-right:none}
.tbar button.act{background:var(--accent);color:#fff}
.zbar{position:relative;height:6px;border-radius:3px;background:linear-gradient(90deg,#60a5fa,#34d399,#facc15,#fb923c,#f87171);margin:12px 0 6px}
.zneedle{position:absolute;top:-5px;width:3px;height:16px;background:var(--text);border-radius:2px;transform:translateX(-50%);transition:left .5s;left:0%}
.zlabels{display:flex;justify-content:space-between;font-family:'Geist Mono',monospace;font-size:9px;color:var(--muted)}
.zchips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.zchip{padding:4px 10px;border-radius:20px;font-size:10px;font-family:'Geist Mono',monospace;border:1px solid var(--border);color:var(--muted)}
.zchip.act{font-weight:600;color:#fff}
.sdots{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.sdot{width:28px;height:28px;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);font-family:'Geist Mono',monospace;font-weight:600}
.sdot.s1{background:var(--accent-light);border-color:#bfdbfe;color:var(--accent)}
.sdot.s2{background:var(--green-light);border-color:#bbf7d0;color:var(--green)}
.sdot.s3{background:var(--orange-light);border-color:#fed7aa;color:var(--orange)}
.sdot.s4{background:var(--red-light);border-color:#fecaca;color:var(--red)}
.ssep{width:1px;background:var(--border);height:28px}
.rcucard{border-radius:8px;padding:20px;box-shadow:var(--shadow);border:2px solid transparent;margin-bottom:16px}
.rcucard.zsub{background:#f0fdf4;border-color:#86efac}
.rcucard.zsupra{background:#fef2f2;border-color:#fca5a5}
.rzb{display:inline-flex;align-items:center;padding:5px 14px;border-radius:20px;font-family:'Geist Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.zsub .rzb{background:#bbf7d0;color:#15803d}
.zsupra .rzb{background:#fecaca;color:#991b1b}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.rg{grid-template-columns:1fr}}
.rblock{background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.06);border-radius:6px;padding:14px}
.rbtitle{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.rval{font-family:'Instrument Serif',serif;font-size:28px;display:block;line-height:1;margin-bottom:2px}
.zsub .rval{color:var(--green)}.zsupra .rval{color:var(--red)}
.rnature{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;padding-top:6px;border-top:1px solid rgba(0,0,0,.06)}
.rpill{display:inline-block;padding:2px 8px;border-radius:10px;font-family:'Geist Mono',monospace;font-size:10px;font-weight:600;background:var(--accent-light);color:var(--accent);border:1px solid #bfdbfe;margin-top:4px}
.rslw{margin-top:8px}
.rslw label{font-size:10px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:4px}
.rslw input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer;background:var(--border)}
.zsub .rslw input[type=range]{background:#bbf7d0}
.zsupra .rslw input[type=range]{background:#fecaca}
.rslw input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--green);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.zsupra .rslw input[type=range]::-webkit-slider-thumb{background:var(--red)}
.tlwrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;overflow-x:auto}
.tltitle{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.tlrow{display:flex;align-items:center;gap:2px;min-width:max-content;padding:4px 0}
.tlb{height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:9px;font-weight:600;color:#fff;min-width:28px;padding:0 6px;white-space:nowrap}
.tleff{background:var(--accent)}.tlrep{background:var(--green);opacity:.85}.tlser{background:var(--orange)}
.tlleg{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.tllegit{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)}
.tllegdot{width:10px;height:10px;border-radius:2px}
.tltot{display:flex;gap:20px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap}
.tltv{font-family:'Instrument Serif',serif;font-size:22px;display:block}
.tltl{font-size:10px;color:var(--muted);font-family:'Geist Mono',monospace}
.btn{width:100%;padding:13px;background:var(--accent);color:#fff;font-family:'Geist',sans-serif;font-size:14px;font-weight:600;border:none;border-radius:7px;cursor:pointer;transition:all .15s;letter-spacing:.02em;margin-top:10px;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.btn:hover{background:#1d4ed8;transform:translateY(-1px)}
.btnsm{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;font-family:'Geist',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.bcopy{background:var(--bg);border:1px solid var(--border);color:var(--muted)}
.bcopy:hover{background:var(--border);color:var(--text)}
.bemail{background:#0ea5e9;color:#fff}
.bemail:hover{background:#0284c7}
.sumcard{display:none;background:var(--surface);border:1px solid #bfdbfe;border-radius:8px;padding:20px;margin-top:16px}
.sumtitle{font-family:'Instrument Serif',serif;font-size:20px;margin-bottom:14px}
.sumgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:680px){.sumgrid{grid-template-columns:1fr 1fr}}
.si{padding:10px 12px;background:var(--bg);border-radius:5px;border:1px solid var(--border)}
.si .sil{font-size:10px;color:var(--muted);margin-bottom:2px}
.si .siv{font-family:'Geist Mono',monospace;font-size:14px;font-weight:600}
.si.sia{background:var(--accent-light);border-color:#bfdbfe}.si.sia .siv{color:var(--accent)}
.si.sig{background:var(--green-light);border-color:#bbf7d0}.si.sig .siv{color:var(--green)}
.si.sip{background:var(--purple-light);border-color:#ddd6fe}.si.sip .siv{color:var(--purple)}
#copyToast{display:none;margin-top:10px;padding:8px 14px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:5px;font-size:12px;color:#15803d;font-family:'Geist Mono',monospace}
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-md);overflow:hidden;margin-top:4px}
.ttbar{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;background:#fafaf8}
.ttit{font-family:'Instrument Serif',serif;font-size:18px}
.ttit span{font-family:'Geist Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-left:8px;vertical-align:middle}
.tfilt{display:flex;align-items:center;gap:8px}
.tfilt label{font-size:11px;color:var(--muted)}
.tfilt select{background:var(--bg);border:1px solid var(--border);border-radius:4px;font-family:'Geist Mono',monospace;font-size:11px;color:var(--text);padding:4px 8px;outline:none;cursor:pointer}
.tscroll{overflow-x:auto}
table.vt{width:100%;border-collapse:collapse;font-size:12px}
table.vt thead tr{background:var(--text);color:#fff}
table.vt thead th{padding:10px;text-align:center;font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;white-space:nowrap;border-right:1px solid rgba(255,255,255,.1)}
table.vt thead th:last-child{border-right:none}
table.vt thead tr.sh th{background:#111;font-size:8px;color:rgba(255,255,255,.5);padding:5px 10px;border-bottom:1px solid rgba(255,255,255,.1)}
table.vt tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
table.vt tbody tr:hover{background:#f9f8f5}
table.vt tbody tr.z15{background:#f0fdf4}
table.vt tbody tr.z18{background:#fff7ed}
table.vt tbody tr.z20{background:#fef2f2}
table.vt tbody tr.ath{background:#eff4ff!important;outline:2px solid var(--accent);outline-offset:-1px}
table.vt td{padding:8px 10px;text-align:center;font-family:'Geist Mono',monospace;border-right:1px solid var(--border);white-space:nowrap;vertical-align:middle}
table.vt td:last-child{border-right:none}
table.vt td:first-child{font-weight:600;background:#fafaf8;text-align:left;padding-left:14px;border-right:2px solid var(--border2);min-width:72px}
table.vt td.gs{border-right:2px solid var(--border2)}
table.vt td.cv{color:var(--indigo);font-weight:600}
table.vt td.cb{color:var(--green)}
table.vt td.cr{color:var(--red);font-weight:600}
table.vt td.co{color:var(--orange)}
table.vt td.ca{color:var(--accent)}
table.vt td.cp{color:var(--purple);font-weight:700}
table.vt td.cg{color:var(--green);font-weight:600}
table.vt td.crs{color:var(--red);font-weight:600}
.tleg2{padding:10px 18px;background:#fafaf8;border-top:1px solid var(--border);display:flex;gap:14px;flex-wrap:wrap}
.tlegit{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.tlegdot{width:10px;height:10px;border-radius:2px}
footer.cp{background:#f0f4ff;padding:36px 24px 28px;text-align:center;margin-top:60px;position:relative;overflow:hidden;border-top:1px solid #bfdbfe}
footer.cp::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#2563eb,#60a5fa,#93c5fd,#2563eb)}
.ftt{font-family:'Instrument Serif',serif;font-size:18px;color:#1a1916;margin-bottom:6px;font-weight:400}
.ftt em{font-style:italic;color:#2563eb}
.ftr{font-family:'Geist Mono',monospace;font-size:11px;color:#6b7280;letter-spacing:.12em;margin-bottom:6px}
.fta{font-family:'Geist',sans-serif;font-size:13px;color:#374151;margin-bottom:18px}
.fta strong{color:#1a1916}
.fte{display:inline-flex;align-items:center;gap:8px;padding:9px 22px;background:#dbeafe;border:1px solid #bfdbfe;border-radius:24px;color:#1d4ed8;font-family:'Geist Mono',monospace;font-size:12px;font-weight:500;text-decoration:none;transition:all .2s}
.fte:hover{background:#bfdbfe;transform:translateY(-1px)}
.ftd{width:40px;height:1px;background:#bfdbfe;margin:20px auto 14px}
.fto{font-family:'Geist Mono',monospace;font-size:10px;color:#9ca3af;letter-spacing:.1em}
.spacer{height:28px}
.divider{height:1px;background:var(--border);margin:24px 0}

/* ============================================
   OPTIMISATION MOBILE — Responsive complet
   ============================================ */

/* Smartphone portrait (≤480px) */
@media(max-width:480px){
  /* Page padding réduit */
  .page{padding:20px 14px 60px}

  /* Header vertical */
  .header{flex-direction:column;gap:16px}
  .header > div:last-child{align-items:flex-start;width:100%}
  .header > div:last-child .field{min-width:unset!important;width:100%}

  /* Titre plus compact */
  .htitle{font-size:34px}
  .hsub{font-size:12px}

  /* Métriques : 2 colonnes */
  .mrow{grid-template-columns:1fr 1fr;gap:8px}
  .mval{font-size:22px}
  .munit{font-size:8px}
  .mname{font-size:9px}
  .metric{padding:12px 8px}

  /* Grilles : 1 colonne */
  .g2,.g3{grid-template-columns:1fr;gap:12px}

  /* Cards : padding réduit */
  .card{padding:14px}
  .ctitle{font-size:9px;margin-bottom:10px;padding-bottom:8px}

  /* Champs : fontSize 16px pour éviter zoom iOS */
  .field input,.field select{font-size:16px!important;padding:11px 12px}
  .field label{font-size:12px}
  .hint{font-size:10px}

  /* Bouton toggle : plus grand */
  .tbar button{padding:11px 8px;font-size:13px}

  /* Récupération */
  .rg{grid-template-columns:1fr}
  .rcucard{padding:14px}
  .rval{font-size:24px}
  .rblock{padding:12px}

  /* Timeline : scroll horizontal propre */
  .tlwrap{padding:14px}
  .tlrow{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
  .tltitle{font-size:9px}

  /* Bouton principal */
  .btn{padding:15px;font-size:15px}

  /* Bilan */
  .sumcard{padding:14px}
  .sumgrid{grid-template-columns:1fr 1fr!important}
  .si{padding:8px 10px}
  .si .sil{font-size:10px}
  .si .siv{font-size:12px}

  /* Actions bilan */
  .sumcard > div:first-child{flex-direction:column;align-items:flex-start}
  .sumcard > div:first-child > div{width:100%;display:flex;gap:8px}
  .btnsm{flex:1;justify-content:center;padding:11px 10px;font-size:13px}

  /* Tableau : scroll horizontal avec indicateur */
  .twrap{border-radius:6px}
  .tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tscroll::before{content:'← Faites défiler →';display:block;text-align:center;font-size:10px;color:var(--muted);padding:6px;font-family:"Geist Mono",monospace;background:#fafaf8;border-bottom:1px solid var(--border)}
  table.vt{font-size:10px;min-width:900px}
  table.vt thead th{font-size:7px;padding:7px 6px;letter-spacing:.06em}
  table.vt thead tr.sh th{font-size:6px;padding:4px 6px}
  table.vt td{padding:6px 7px;font-size:10px}
  table.vt td:first-child{padding-left:10px;min-width:52px}

  /* Toolbar tableau */
  .ttbar{flex-direction:column;align-items:flex-start;gap:8px;padding:12px 14px}
  .ttit{font-size:15px}
  .ttit span{display:block;margin-left:0;margin-top:3px}
  .tfilt{width:100%;justify-content:space-between}
  .tfilt select{flex:1;padding:8px 10px;font-size:13px}

  /* Légende tableau */
  .tleg2{flex-direction:column;gap:6px;padding:10px 14px}
  .tlegit{font-size:10px}

  /* Section titles */
  .stitle{font-size:9px;letter-spacing:.12em;margin-bottom:12px}

  /* Zone chips */
  .zchips{gap:4px}
  .zchip{font-size:9px;padding:3px 7px}

  /* Serie dots */
  .sdot{width:24px;height:24px;font-size:9px}

  /* Slider */
  .rslw input[type=range]{height:6px}
  .rslw input[type=range]::-webkit-slider-thumb{width:20px;height:20px}

  /* Footer */
  footer.cp{padding:28px 16px 24px}
  .ftt{font-size:16px}
  .ftr{font-size:10px;letter-spacing:.08em}
  .fte{font-size:11px;padding:8px 16px}
  .fto{font-size:9px}

  /* Timeline total */
  .tltot{gap:10px;justify-content:space-between}
  .tltot > div{flex:1 1 45%}
  .tltv{font-size:18px}
  .tltl{font-size:9px}
}

/* Tablette portrait (481px–768px) */
@media(min-width:481px) and (max-width:768px){
  .page{padding:28px 18px 60px}
  .header{flex-direction:column;gap:16px}
  .header > div:last-child{align-items:flex-start;width:100%}
  .header > div:last-child .field{min-width:unset!important;width:48%}
  .header > div:last-child{flex-direction:row;flex-wrap:wrap;gap:12px}
  .g3{grid-template-columns:1fr 1fr}
  .mrow{grid-template-columns:repeat(4,1fr)}
  .field input,.field select{font-size:16px!important}
  .tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tscroll::before{content:'← Faites défiler →';display:block;text-align:c
